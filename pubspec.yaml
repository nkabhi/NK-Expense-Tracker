name: expense_tracker
description: Offline expense, income and investment tracker with SMS auto-capture.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Encrypted local database — SQLCipher-backed sqflite, all data stays on-device
  sqflite_sqlcipher: ^3.1.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # SMS reading + listening for new messages (Android only)
  telephony: ^0.2.0
  permission_handler: ^11.3.1

  # Charts
  fl_chart: ^0.68.0

  # Excel report export
  excel: ^4.0.6
  share_plus: ^9.0.0

  intl: ^0.19.0
  uuid: ^4.4.0

  # Stores the database encryption passphrase in the Android Keystore —
  # hardware-backed, never written in plain text anywhere in the app
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
